spring:
  application:
    name: dayLog
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  thymeleaf:
    cache: true
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    whitelabel:
      enabled: false
  shutdown: graceful
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}
        same-site: lax
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
day-log:
  account:
    password-reset-token-validity-minutes: ${DAY_LOG_PASSWORD_RESET_TOKEN_VALIDITY_MINUTES:30}
  mail:
    from-address: ${DAY_LOG_MAIL_FROM_ADDRESS:no-reply@daylog.local}
  security:
    remember-me-key: ${DAY_LOG_REMEMBER_ME_KEY}
    remember-me-cookie-name: ${DAY_LOG_REMEMBER_ME_COOKIE_NAME:DAY_LOG_REMEMBER_ME}
    remember-me-token-validity-seconds: ${DAY_LOG_REMEMBER_ME_TOKEN_VALIDITY_SECONDS:1209600}
