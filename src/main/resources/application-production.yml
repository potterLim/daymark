spring:
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  servlet:
    session:
      cookie:
        secure: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:true}

daymark:
  public-base-url: ${DAYMARK_PUBLIC_BASE_URL:}
  operations:
    production-readiness:
      enabled: true
      require-smtp: true
      require-alert-webhook: true
      require-secure-session-cookie: true
      minimum-remember-me-key-length: ${DAYMARK_MINIMUM_REMEMBER_ME_KEY_LENGTH:32}
    weekly-summary:
      enabled: true
      cron: ${DAYMARK_WEEKLY_SUMMARY_CRON:0 0 9 * * MON}
      zone: ${DAYMARK_WEEKLY_SUMMARY_ZONE:Asia/Seoul}
  security:
    remember-me-cookie-secure: ${DAYMARK_REMEMBER_ME_COOKIE_SECURE:true}
