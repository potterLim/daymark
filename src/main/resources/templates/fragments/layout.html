<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef3fb" />
    <title th:text="${pageTitle} + ' · Daymark'">Daymark</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/daymark-logo.svg}" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
</head>
<body class="app-body">
<div class="app-background" aria-hidden="true">
    <div class="app-gradient app-gradient-blue"></div>
    <div class="app-gradient app-gradient-silver"></div>
    <div class="app-gradient app-gradient-cyan"></div>
    <div class="app-gradient app-gradient-amber"></div>
    <div class="app-ribbon app-ribbon-left"></div>
    <div class="app-ribbon app-ribbon-right"></div>
    <div class="app-grid-texture"></div>
</div>

<header class="app-header" data-app-header>
    <div class="app-frame topbar-shell">
        <a class="brand-lockup" th:href="@{/}">
            <span class="brand-symbol">
                <svg viewBox="0 0 64 64" role="img" aria-label="Daymark">
                    <defs>
                        <linearGradient id="brand-mark-bg" x1="10" y1="5" x2="54" y2="59" gradientUnits="userSpaceOnUse">
                            <stop offset="0" stop-color="#4a91ff" />
                            <stop offset=".55" stop-color="#1d66f2" />
                            <stop offset="1" stop-color="#0c3a9d" />
                        </linearGradient>
                        <linearGradient id="brand-mark-page" x1="20" y1="13" x2="44" y2="52" gradientUnits="userSpaceOnUse">
                            <stop offset="0" stop-color="#ffffff" />
                            <stop offset="1" stop-color="#dce9ff" />
                        </linearGradient>
                    </defs>
                    <rect x="2" y="2" width="60" height="60" rx="19" fill="url(#brand-mark-bg)" />
                    <path d="M23 14.5h18a4.5 4.5 0 0 1 4.5 4.5v26a4.5 4.5 0 0 1-4.5 4.5H23a4.5 4.5 0 0 1-4.5-4.5V19a4.5 4.5 0 0 1 4.5-4.5Z"
                          fill="url(#brand-mark-page)" />
                    <path d="M19 25.5h26" fill="none" stroke="#b8d1ff" stroke-width="2.8" />
                    <path d="M25 13v8M39 13v8" fill="none" stroke="#f8fbff" stroke-linecap="round" stroke-width="3.4" />
                    <circle cx="28" cy="35" r="5.3" fill="#ffbf5b" />
                    <path d="m27 37.2 4.4 4.4 8.9-11.2" fill="none" stroke="#0e55db" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.9" />
                    <path d="M12 13.5C16.6 8.7 23.3 6 32 6" fill="none" opacity=".42" stroke="#ffffff" stroke-linecap="round" stroke-width="2.2" />
                </svg>
            </span>
            <span class="brand-copy">
                <strong>Daymark</strong>
            </span>
        </a>

        <nav sec:authorize="isAuthenticated()" class="primary-nav" aria-label="주요 메뉴">
            <a class="nav-chip"
               th:classappend="${pageTitle == '홈'} ? ' is-active' : ''"
               th:href="@{/}">
                Home
            </a>
            <a class="nav-chip"
               th:classappend="${#strings.contains(pageTitle, '아침')} ? ' is-active' : ''"
               th:href="@{/daymark/morning}">
                Morning
            </a>
            <a class="nav-chip"
               th:classappend="${#strings.contains(pageTitle, '저녁')} ? ' is-active' : ''"
               th:href="@{/daymark/evening}">
                Evening
            </a>
            <a class="nav-chip"
               th:classappend="${#strings.contains(pageTitle, '주간')} ? ' is-active' : ''"
               th:href="@{/daymark/week}">
                Week
            </a>
            <a class="nav-chip"
               th:classappend="${#strings.contains(pageTitle, '기록') || #strings.contains(pageTitle, 'PDF')} ? ' is-active' : ''"
               th:href="@{/daymark/library}">
                Records
            </a>
            <a sec:authorize="hasRole('ADMIN')"
               class="nav-chip"
               th:classappend="${#strings.contains(pageTitle, '운영')} ? ' is-active' : ''"
               th:href="@{/admin/operations}">
                Operations
            </a>
        </nav>

        <div class="topbar-actions">
            <div sec:authorize="isAuthenticated()" class="session-cluster">
                <div class="session-chip">
                    <span class="session-label">Workspace</span>
                    <strong sec:authentication="name">user</strong>
                </div>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/account}">Account</a>
                <form th:action="@{/logout}" method="post">
                    <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Sign Out</button>
                </form>
            </div>

            <div sec:authorize="isAnonymous()" class="guest-actions">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/login}">Sign In</a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}">Create Account</a>
            </div>
        </div>
    </div>
</header>

<main class="app-main">
    <div class="app-frame">
        <div class="page-flash-stack">
            <div th:if="${param.logout}" class="message-banner message-banner-success" role="alert">
                로그아웃되었습니다.
            </div>
            <div th:if="${accountSuccessMessage}" class="message-banner message-banner-success" role="alert"
                 th:text="${accountSuccessMessage}">
                계정 설정이 완료되었습니다.
            </div>
        </div>

        <div class="page-stage" th:replace="${content}">
            <section></section>
        </div>
    </div>
</main>

<footer class="app-footer">
    <div class="app-frame footer-shell">
        <div class="footer-brand">
            <img th:src="@{/images/daymark-logo.svg}" alt="" width="34" height="34" />
            <div>
                <strong>Daymark</strong>
                <span>Private Workspace</span>
            </div>
        </div>
        <a class="footer-contact"
           th:href="${'mailto:' + supportContactEmailAddress}">
            Contact: <span th:text="${supportContactEmailAddress}">potterLim0808@gmail.com</span>
        </a>
        <span class="footer-year" th:text="${T(java.time.Year).now().getValue()}">2026</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/site.js}"></script>
</body>
</html>
