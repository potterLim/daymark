<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' - DailyLog'">DailyLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
</head>
<body class="app-body">
<header class="topbar-wrap">
    <div class="container">
        <nav class="navbar navbar-expand-sm topbar-nav">
            <div class="container-fluid px-0">
                <a class="navbar-brand brand-mark" th:href="@{/}">
                    <span class="brand-icon">DL</span>
                    <span class="brand-copy">
                        <strong>DailyLog</strong>
                        <small>오늘을 쌓는 기록 루틴</small>
                    </span>
                </a>
                <div class="ms-auto d-flex justify-content-end">
                    <div sec:authorize="isAuthenticated()" class="topbar-actions">
                        <span class="welcome-chip">
                            <span class="welcome-label">안녕하세요</span>
                            <strong sec:authentication="name">user</strong>
                        </span>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
                            <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
                        </form>
                    </div>
                    <div sec:authorize="isAnonymous()" class="topbar-actions">
                        <a class="btn btn-outline btn-sm me-1" th:href="@{/login}">로그인</a>
                        <a class="btn btn-primary btn-sm" th:href="@{/register}">회원가입</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</header>

<div class="container page-shell">
    <main role="main" class="page-content" th:replace="${content}">
        <section></section>
    </main>
</div>

<footer class="footer-shell">
    <div class="container footer-inner">
        <div>
            <strong>DailyLog</strong>
            <span class="footer-copy">일상 계획과 회고를 차분하게 이어가는 개인 기록 공간</span>
        </div>
        <div class="footer-meta">
            &copy; 2025 DailyLog
            <a href="https://github.com/potterLim" target="_blank" rel="noopener noreferrer">
                potterLim
            </a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/site.js}"></script>
</body>
</html>
