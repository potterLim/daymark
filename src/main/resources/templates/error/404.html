<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '페이지를 찾을 수 없음')}">
<section class="workspace-shell">
    <div class="surface-panel error-state-panel">
        <span class="eyebrow">404</span>
        <div>
            <h1 class="section-title">페이지를 찾을 수 없습니다.</h1>
            <p class="section-subtitle">
                사용할 수 없는 주소입니다. 홈이나 기록에서 이어갈 수 있습니다.
            </p>
        </div>
        <div class="error-action-row">
            <a th:href="@{/}" class="btn btn-primary btn-lg">홈으로</a>
            <a th:href="@{/daily-log/library}" class="btn btn-outline-secondary btn-lg">기록 라이브러리</a>
        </div>
    </div>
</section>
</html>
