<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '로그인')}">
<section class="auth-layout auth-layout-centered">
    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <h2>로그인</h2>
            </div>
        </div>

        <form th:action="@{/login}" th:object="${loginRequestDto}" method="post" class="form-stack">
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div th:if="${param.logout}" class="message-banner message-banner-success" role="alert">
                로그아웃되었습니다.
            </div>
            <div th:if="${param.passwordResetSuccess}" class="message-banner message-banner-success" role="alert">
                비밀번호가 재설정되었습니다. 새 비밀번호로 로그인해주세요.
            </div>
            <div th:if="${loginErrorMessage}" class="message-banner message-banner-danger" role="alert" th:text="${loginErrorMessage}">
                로그인에 실패했습니다.
            </div>

            <div class="form-section">
                <label for="loginIdentifier" class="form-label field-label">아이디 또는 이메일</label>
                <input id="loginIdentifier"
                       th:field="*{loginIdentifier}"
                       class="form-control form-control-lg"
                       autocomplete="username"
                       placeholder="아이디 또는 이메일을 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{loginIdentifier}"></div>
            </div>

            <div class="form-section">
                <label for="password" class="form-label field-label">비밀번호</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="current-password"
                       placeholder="비밀번호를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{password}"></div>
            </div>

            <label class="toggle-row" for="rememberMe">
                <span>
                    <strong>로그인 상태 유지</strong>
                </span>
                <input id="rememberMe" th:field="*{rememberMe}" class="form-check-input" type="checkbox" />
            </label>

            <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>

            <div class="auth-helper">
                <a th:href="@{/forgot-password}">Reset Password</a>
                <span class="auth-helper-separator">•</span>
                <a th:href="@{/register}">Create Account</a>
            </div>
        </form>
    </div>
</section>
</html>
