<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '비밀번호 재설정 요청')}">
<section class="auth-layout auth-layout-centered">
    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <h2>비밀번호 재설정 요청</h2>
            </div>
        </div>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequestDto}" method="post" class="form-stack" novalidate>
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div th:if="${forgotPasswordSuccessMessage}" class="message-banner message-banner-success" role="alert"
                 th:text="${forgotPasswordSuccessMessage}">
                안내 메일을 전송했습니다. 메일함을 확인해 주세요.
            </div>

            <div class="form-section">
                <label for="emailAddress" class="form-label field-label">이메일</label>
                <input id="emailAddress"
                       th:field="*{emailAddress}"
                       type="email"
                       class="form-control form-control-lg"
                       autocomplete="email"
                       placeholder="가입에 사용한 이메일을 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{emailAddress}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Send Link</button>

            <div class="auth-helper">
                <a th:href="@{/login}">Sign In</a>
            </div>
        </form>
    </div>
</section>
</html>
