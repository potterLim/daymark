<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '비밀번호 재설정 요청')}">
<section class="auth-layout">
    <div class="surface-panel auth-showcase auth-showcase-rich">
        <div class="auth-showcase-copy">
            <span class="eyebrow">Password recovery</span>
            <h1 class="display-title auth-display-title">계정 복구</h1>
            <p class="lead-copy">
                가입한 이메일로 재설정 또는 인증 안내를 보냅니다.
            </p>
        </div>

        <div class="auth-orbit">
            <div class="auth-floating-card auth-floating-card-primary">
                <span>Secure</span>
                <strong>재설정 링크는 한 번만 유효합니다.</strong>
                <p>만료되었거나 사용된 링크는 다시 요청해야 합니다.</p>
            </div>
            <div class="auth-floating-card">
                <span>Private</span>
                <strong>계정 존재 여부는 노출하지 않습니다.</strong>
                <p>복구 안내는 가능한 경우에만 조용히 전송됩니다.</p>
            </div>
        </div>
    </div>

    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Reset request</span>
                <h2>비밀번호 재설정 요청</h2>
            </div>
            <p>이메일을 입력하면 복구 절차를 시작합니다.</p>
        </div>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequestDto}" method="post" class="form-stack">
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div th:if="${forgotPasswordSuccessMessage}" class="message-banner message-banner-success" role="alert"
                 th:text="${forgotPasswordSuccessMessage}">
                재설정 안내를 전송했습니다.
            </div>

            <div class="form-section">
                <label for="emailAddress" class="form-label field-label">이메일</label>
                <input id="emailAddress"
                       th:field="*{emailAddress}"
                       type="email"
                       class="form-control form-control-lg"
                       autocomplete="email"
                       placeholder="가입에 사용한 이메일을 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{emailAddress}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">복구 메일 보내기</button>

            <div class="auth-helper">
                <a th:href="@{/login}">로그인</a>
            </div>
        </form>
    </div>
</section>
</html>
