<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '비밀번호 도움말')}">
<section class="auth-layout auth-layout-centered">
    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <h2>비밀번호 도움말</h2>
            </div>
        </div>

        <div class="form-stack">
            <div class="google-start-card">
                <span>Password Help</span>
                <strong>Google 계정으로 로그인하면 Workspace에 다시 접근할 수 있습니다.</strong>
            </div>

            <a class="btn btn-google btn-lg w-100" th:href="@{/oauth2/authorization/google}">
                Continue with Google
            </a>

            <div class="auth-helper">
                <a th:href="@{/login}">Sign In</a>
            </div>
        </div>
    </div>
</section>
</html>
