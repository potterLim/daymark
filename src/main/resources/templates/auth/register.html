<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '회원가입')}">
<section class="auth-layout">
    <div class="surface-panel auth-showcase auth-showcase-emerald">
        <span class="eyebrow">Create account</span>
        <h1 class="display-title auth-display-title">개인 기록 공간을 바로 시작하고, 하루의 리듬을 쌓아가세요.</h1>
        <p class="lead-copy">
            회원가입 후에는 계획, 회고, 주간 성취 기록이 모두 사용자별로 분리되어
            안정적으로 관리됩니다.
        </p>

        <div class="auth-preview-board">
            <div class="auth-preview-card">
                <strong>개인별 분리</strong>
                <span>각 사용자 영역이 독립적으로 관리됩니다.</span>
            </div>
            <div class="auth-preview-card">
                <strong>즉시 시작</strong>
                <span>가입 직후 바로 아침 계획 화면으로 이어집니다.</span>
            </div>
            <div class="auth-preview-card">
                <strong>누적 기록</strong>
                <span>하루 단위 기록이 주간 흐름으로 자연스럽게 연결됩니다.</span>
            </div>
        </div>
    </div>

    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Join DailyLog</span>
                <h2>회원가입</h2>
            </div>
            <p>간단한 정보만 입력하면 바로 나만의 기록 루틴을 시작할 수 있습니다.</p>
        </div>

        <form th:action="@{/register}" th:object="${registerRequestDto}" method="post" class="form-stack">
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div class="form-section">
                <label for="userName" class="form-label field-label">아이디</label>
                <input id="userName"
                       th:field="*{userName}"
                       class="form-control form-control-lg"
                       autocomplete="username"
                       placeholder="사용할 아이디를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{userName}"></div>
            </div>

            <div class="form-section">
                <label for="password" class="form-label field-label">비밀번호</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{password}"></div>
            </div>

            <div class="form-section">
                <label for="confirmPassword" class="form-label field-label">비밀번호 확인</label>
                <input id="confirmPassword"
                       th:field="*{confirmPassword}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 한 번 더 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">회원가입</button>

            <div class="auth-helper">
                <span>이미 계정이 있으신가요?</span>
                <a th:href="@{/login}">로그인으로 돌아가기</a>
            </div>
        </form>
    </div>
</section>
</html>
