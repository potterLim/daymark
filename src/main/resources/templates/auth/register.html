<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '회원가입')}">
<section class="auth-layout">
    <div class="surface-panel auth-showcase auth-showcase-rich auth-showcase-emerald">
        <div class="auth-showcase-copy">
            <span class="eyebrow">Create account</span>
            <h1 class="display-title auth-display-title">워크스페이스 만들기</h1>
            <p class="lead-copy">
                계획, 회고, 주간 리뷰를 한 계정 안에서 관리합니다.
            </p>
        </div>

        <div class="auth-orbit">
            <div class="auth-floating-card auth-floating-card-primary">
                <span>Private</span>
                <strong>계정별 기록 분리</strong>
            </div>
            <div class="auth-floating-card">
                <span>Start</span>
                <strong>가입 직후 시작</strong>
            </div>
            <div class="auth-floating-card">
                <span>Review</span>
                <strong>주간 리뷰 연결</strong>
            </div>
        </div>

        <div class="auth-stat-grid">
            <div class="auth-stat-card">
                <span>Secure</span>
                <strong>개인별 분리 저장</strong>
            </div>
            <div class="auth-stat-card">
                <span>Simple</span>
                <strong>가입 직후 바로 시작</strong>
            </div>
            <div class="auth-stat-card">
                <span>Routine</span>
                <strong>루틴이 쌓이는 구조</strong>
            </div>
        </div>
    </div>

    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Join DailyLog</span>
                <h2>회원가입</h2>
            </div>
            <p>오늘의 기록을 시작합니다.</p>
        </div>

        <form th:action="@{/register}" th:object="${registerRequestDto}" method="post" class="form-stack">
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div class="form-section">
                <label for="userName" class="form-label field-label">아이디</label>
                <input id="userName"
                       th:field="*{userName}"
                       class="form-control form-control-lg"
                       autocomplete="username"
                       placeholder="사용할 아이디를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{userName}"></div>
            </div>

            <div class="form-section">
                <label for="emailAddress" class="form-label field-label">이메일</label>
                <input id="emailAddress"
                       th:field="*{emailAddress}"
                       type="email"
                       class="form-control form-control-lg"
                       autocomplete="email"
                       placeholder="사용할 이메일을 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{emailAddress}"></div>
                <small class="field-hint">인증과 복구에 사용됩니다.</small>
            </div>

            <div class="form-section">
                <label for="password" class="form-label field-label">비밀번호</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{password}"></div>
            </div>

            <div class="form-section">
                <label for="confirmPassword" class="form-label field-label">비밀번호 확인</label>
                <input id="confirmPassword"
                       th:field="*{confirmPassword}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 한 번 더 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">계정 만들기</button>

            <div class="auth-helper">
                <span>이미 계정이 있으신가요?</span>
                <a th:href="@{/login}">로그인</a>
            </div>
        </form>
    </div>
</section>
</html>
