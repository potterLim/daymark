<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '회원가입')}">
<section class="auth-layout auth-layout-centered">
    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <h2>회원가입</h2>
            </div>
        </div>

        <form th:action="@{/register}" th:object="${registerRequestDto}" method="post" class="form-stack" novalidate>
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

            <div class="form-section">
                <label for="userName" class="form-label field-label">워크스페이스 ID</label>
                <input id="userName"
                       th:field="*{userName}"
                       class="form-control form-control-lg"
                       autocomplete="username"
                       placeholder="사용할 워크스페이스 ID를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{userName}"></div>
            </div>

            <div class="form-section">
                <label for="emailAddress" class="form-label field-label">이메일</label>
                <input id="emailAddress"
                       th:field="*{emailAddress}"
                       type="email"
                       class="form-control form-control-lg"
                       autocomplete="email"
                       placeholder="사용할 이메일을 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{emailAddress}"></div>
            </div>

            <div class="form-section">
                <label for="password" class="form-label field-label">비밀번호</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{password}"></div>
            </div>

            <div class="form-section">
                <label for="confirmPassword" class="form-label field-label">비밀번호 확인</label>
                <input id="confirmPassword"
                       th:field="*{confirmPassword}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="비밀번호를 한 번 더 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Create Account</button>

            <div class="auth-helper">
                <a th:href="@{/login}">Sign In</a>
            </div>
        </form>
    </div>
</section>
</html>
