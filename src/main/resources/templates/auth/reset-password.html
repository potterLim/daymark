<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '비밀번호 재설정')}">
<section class="auth-layout auth-layout-centered">
    <div class="surface-panel auth-card">
        <div class="panel-header">
            <div>
                <h2>비밀번호 재설정</h2>
            </div>
        </div>

        <div th:if="${passwordResetErrorMessage}" class="message-banner message-banner-danger" role="alert"
             th:text="${passwordResetErrorMessage}">
            재설정 링크를 사용할 수 없습니다.
        </div>

        <form th:if="${isPasswordResetTokenValid}" th:action="@{/reset-password}" th:object="${resetPasswordRequestDto}"
              method="post" class="form-stack">
            <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
            <input type="hidden" th:field="*{token}" />

            <div class="form-section">
                <label for="password" class="form-label field-label">새 비밀번호</label>
                <input id="password"
                       th:field="*{password}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="새 비밀번호를 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{password}"></div>
            </div>

            <div class="form-section">
                <label for="confirmPassword" class="form-label field-label">새 비밀번호 확인</label>
                <input id="confirmPassword"
                       th:field="*{confirmPassword}"
                       type="password"
                       class="form-control form-control-lg"
                       autocomplete="new-password"
                       placeholder="새 비밀번호를 한 번 더 입력하세요" />
                <div class="text-danger mt-2" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Save Password</button>
        </form>

        <div class="auth-helper">
            <a th:href="@{/forgot-password}">Request Link</a>
            <span class="auth-helper-separator">•</span>
            <a th:href="@{/login}">Sign In</a>
        </div>
    </div>
</section>
</html>
