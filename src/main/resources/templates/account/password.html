<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::section}, '계정 보안')}">
<section class="workspace-shell">
    <div class="account-security-layout">
        <div class="surface-panel editor-main account-security-card">
            <div class="panel-header account-security-header">
                <div>
                    <span class="eyebrow">Account</span>
                    <h2>Password</h2>
                </div>
                <div class="account-identity-card">
                    <span>Signed in as</span>
                    <strong sec:authentication="name">user</strong>
                </div>
            </div>

            <div th:if="${passwordChangeSuccessMessage}" class="message-banner message-banner-success" role="alert"
                 th:text="${passwordChangeSuccessMessage}">
                비밀번호가 변경되었습니다.
            </div>

            <form th:action="@{/account/password}" th:object="${changePasswordRequestDto}" method="post" class="form-stack">
                <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>

                <div class="form-section">
                    <label for="currentPassword" class="form-label field-label">현재 비밀번호</label>
                    <input id="currentPassword"
                           th:field="*{currentPassword}"
                           type="password"
                           class="form-control form-control-lg"
                           autocomplete="current-password"
                           placeholder="현재 비밀번호를 입력하세요" />
                    <div class="text-danger mt-2" th:errors="*{currentPassword}"></div>
                </div>

                <div class="form-section">
                    <label for="newPassword" class="form-label field-label">새 비밀번호</label>
                    <input id="newPassword"
                           th:field="*{newPassword}"
                           type="password"
                           class="form-control form-control-lg"
                           autocomplete="new-password"
                           placeholder="새 비밀번호를 입력하세요" />
                    <div class="text-danger mt-2" th:errors="*{newPassword}"></div>
                </div>

                <div class="form-section">
                    <label for="confirmNewPassword" class="form-label field-label">새 비밀번호 확인</label>
                    <input id="confirmNewPassword"
                           th:field="*{confirmNewPassword}"
                           type="password"
                           class="form-control form-control-lg"
                           autocomplete="new-password"
                           placeholder="새 비밀번호를 한 번 더 입력하세요" />
                    <div class="text-danger mt-2" th:errors="*{confirmNewPassword}"></div>
                </div>

                <div class="password-rule-card">
                    <span>Requirement</span>
                    <strong>8-72 characters</strong>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">Save Password</button>
            </form>
        </div>
    </div>
</section>
</html>
