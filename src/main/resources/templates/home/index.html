<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::section}, '홈')}">
<section class="home-shell">
    <div class="hero-grid hero-grid-premium">
        <div class="surface-panel hero-panel-primary hero-panel-premium">
            <div class="hero-copy-stack">
                <h1 class="display-title">Daymark</h1>
                <p class="hero-tagline">
                    <span>매일의 목표를 세우고 하루를 돌아보는 습관, 그 단순한 루틴이 자기계발의 시작입니다.</span>
                </p>
            </div>

            <div class="hero-action-row">
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAuthenticated()"
                   th:href="${todayMorningPath}">
                    Plan
                </a>
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAnonymous()"
                   th:href="@{/login(next=${todayMorningPath})}">
                    Plan
                </a>
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAuthenticated()"
                   th:href="${todayEveningPath}">
                    Review
                </a>
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAnonymous()"
                   th:href="@{/login(next=${todayEveningPath})}">
                    Review
                </a>
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAuthenticated()"
                   th:href="${todayPreviewPath}">
                    View Today
                </a>
                <a class="btn btn-primary btn-lg"
                   sec:authorize="isAnonymous()"
                   th:href="@{/login(next=${todayPreviewPath})}">
                    View Today
                </a>
            </div>
        </div>

        <div class="hero-side-stack">
            <div class="surface-panel hero-side-panel hero-side-panel-dark">
                <div class="panel-header compact panel-header-inverse">
                    <div>
                        <h2>Today</h2>
                    </div>
                </div>

                <div class="product-window product-window-dark">
                    <div class="window-toolbar">
                        <span class="window-dot"></span>
                        <span class="window-dot"></span>
                        <span class="window-dot"></span>
                        <strong>Daily rhythm</strong>
                    </div>
                    <div class="window-content">
                        <div class="window-row">
                            <span>AM</span>
                            <strong>Plan</strong>
                            <em>Start</em>
                        </div>
                        <div class="window-row">
                            <span>DAY</span>
                            <strong>Check</strong>
                            <em>Keep</em>
                        </div>
                        <div class="window-row">
                            <span>PM</span>
                            <strong>Review</strong>
                            <em>Close</em>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
