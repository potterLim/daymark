<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '☀️ 아침 계획')}">
<section class="page-section">
    <div class="section-hero">
        <div>
            <span class="section-eyebrow">Morning planning</span>
            <h1 class="section-title" th:text="'아침 계획 · ' + ${#temporals.format(morningFormDto.date, 'yyyy-MM-dd')}">아침 계획</h1>
            <p class="section-subtitle">오늘의 목표와 집중 포인트, 예상 난관을 한 번에 정리합니다.</p>
        </div>
    </div>

    <form th:action="@{/daily-log/morning/save}" th:object="${morningFormDto}" method="post" class="form-stack">
        <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
        <input type="hidden" th:field="*{date}" />

        <div class="content-card form-panel">
            <div class="field-block">
                <label for="goals" class="form-label field-label">Goals</label>
                <p class="field-hint">줄마다 하나씩 작성하면 목록 형태로 저장됩니다.</p>
                <textarea id="goals" th:field="*{goals}" class="form-control" rows="7"></textarea>
                <div class="text-danger mt-2" th:errors="*{date}"></div>
            </div>

            <div class="field-block">
                <label for="focus" class="form-label field-label">Focus Areas</label>
                <p class="field-hint">오늘 반드시 집중하고 싶은 영역을 적어두세요.</p>
                <textarea id="focus" th:field="*{focus}" class="form-control" rows="4"></textarea>
            </div>

            <div class="field-block">
                <label for="challenges" class="form-label field-label">Challenges &amp; Strategies</label>
                <p class="field-hint">예상되는 방해 요소와 대응 방식을 함께 적어두면 회고에 도움이 됩니다.</p>
                <textarea id="challenges" th:field="*{challenges}" class="form-control" rows="4"></textarea>
            </div>
        </div>

        <div class="button-row">
            <button type="submit" class="btn btn-primary">저장</button>
            <a th:href="@{/daily-log/morning}" class="btn btn-outline-secondary">날짜 목록</a>
            <a th:href="@{/}" class="btn btn-outline-secondary">홈으로</a>
        </div>
    </form>
</section>
</html>
