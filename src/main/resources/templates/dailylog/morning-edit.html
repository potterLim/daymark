<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '아침 계획')}">
<section class="workspace-shell">
    <div class="surface-panel workspace-hero workspace-hero-morning">
        <div class="workspace-header workspace-header-rich">
            <div class="workspace-header-copy">
                <span class="eyebrow">Morning</span>
                <h1 class="section-title" th:text="'아침 계획 · ' + ${#temporals.format(morningFormDto.date, 'yyyy-MM-dd')}">아침 계획</h1>
                <p class="section-subtitle">오늘의 기준을 정합니다.</p>
            </div>
            <div class="workspace-meta-stack">
                <div class="workspace-meta-card">
                    <span class="workspace-meta-label">Goal format</span>
                    <strong>줄마다 하나의 목표</strong>
                    <p>체크리스트로 연결</p>
                </div>
                <div class="workspace-meta-card workspace-meta-card-accent">
                    <span class="workspace-meta-label">Review</span>
                    <strong>저녁에 바로 확인</strong>
                    <p>같은 날짜에 저장</p>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/daily-log/morning/save}" th:object="${morningFormDto}" method="post" class="editor-grid">
        <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
        <input type="hidden" th:field="*{date}" />

        <div class="surface-panel editor-main">
            <div class="form-section">
                <label for="goals" class="form-label field-label">목표</label>
                <textarea id="goals"
                          th:field="*{goals}"
                          class="form-control text-area js-autosize"
                          rows="7"
                          placeholder="예: 제품 미리보기 점검&#10;예: 고객 피드백 정리"></textarea>
                <div class="text-danger mt-2" th:errors="*{date}"></div>
            </div>

            <div class="form-section">
                <label for="focus" class="form-label field-label">집중 영역</label>
                <textarea id="focus"
                          th:field="*{focus}"
                          class="form-control text-area js-autosize"
                          rows="4"
                          placeholder="예: 오전에는 문서 정리, 오후에는 사용자 흐름 확인"></textarea>
            </div>

            <div class="form-section">
                <label for="challenges" class="form-label field-label">예상 변수</label>
                <textarea id="challenges"
                          th:field="*{challenges}"
                          class="form-control text-area js-autosize"
                          rows="4"
                          placeholder="예: 회의가 길어지면 핵심 목표부터 처리"></textarea>
            </div>
        </div>

        <aside class="editor-side">
            <div class="surface-panel side-note surface-panel-elevated">
                <div class="panel-header compact">
                    <div>
                        <span class="eyebrow">Guide</span>
                        <h2>작성 기준</h2>
                    </div>
                </div>
                <ul class="helper-list">
                    <li>오늘 끝낼 크기</li>
                    <li>가장 중요한 한두 가지</li>
                    <li>방해 요소와 대응</li>
                </ul>
            </div>

            <div class="surface-panel side-note accent-surface">
                <div class="panel-header compact">
                    <div>
                        <span class="eyebrow">Linked</span>
                        <h2>저녁 회고</h2>
                    </div>
                </div>
                <p>목표가 체크리스트로 이어집니다.</p>
            </div>

            <div class="action-stack">
                <button type="submit" class="btn btn-primary btn-lg">계획 저장</button>
                <a th:href="@{/daily-log/morning}" class="btn btn-outline-secondary">아침 목록</a>
                <a th:href="@{/}" class="btn btn-light">홈</a>
            </div>
        </aside>
    </form>
</section>
</html>
