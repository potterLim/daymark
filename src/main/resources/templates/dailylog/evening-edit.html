<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '🌙 저녁 회고')}">
<section class="page-section">
    <div class="section-hero">
        <div>
            <span class="section-eyebrow">Evening reflection</span>
            <h1 class="section-title" th:text="'저녁 회고 · ' + ${#temporals.format(eveningFormDto.date, 'yyyy-MM-dd')}">저녁 회고</h1>
            <p class="section-subtitle">아침 계획을 다시 보면서 실제 실행 결과와 회고를 정리합니다.</p>
        </div>
    </div>

    <div class="content-card preview-card mb-4">
        <div class="content-card-header">
            <h2>오늘 아침 기록</h2>
            <span class="content-card-badge">Reference</span>
        </div>
        <div class="preview-markdown" th:utext="${morningLogHtml}">
            <p><em>아침 로그가 없습니다.</em></p>
        </div>
    </div>

    <form th:action="@{/daily-log/evening/save}" th:object="${eveningFormDto}" method="post" class="form-stack">
        <th:block th:replace="~{fragments/csrf :: hiddenInput}"></th:block>
        <input type="hidden" th:field="*{date}" />

        <div class="content-card form-panel">
            <div class="field-block">
                <label class="form-label field-label">Goals</label>
                <p class="field-hint">완료한 항목은 체크해서 실제 달성률 계산에 반영합니다.</p>
                <div th:if="${#lists.isEmpty(eveningFormDto.goals)}" class="empty-inline">
                    아침 목표가 없습니다.
                </div>
                <div th:each="goalItem, goalStatus : *{goals}" class="goal-check-item">
                    <input th:id="'goal-' + ${goalStatus.index}"
                           th:field="*{goals[__${goalStatus.index}__].done}"
                           class="form-check-input"
                           type="checkbox" />
                    <input type="hidden" th:field="*{goals[__${goalStatus.index}__].text}" />
                    <label th:for="'goal-' + ${goalStatus.index}"
                           class="form-check-label"
                           th:text="${goalItem.text}">
                        목표
                    </label>
                </div>
                <div class="text-danger mt-2" th:errors="*{date}"></div>
            </div>

            <div class="field-block">
                <label for="achievements" class="form-label field-label">Achievements</label>
                <p class="field-hint">오늘 실제로 잘된 점과 결과를 남겨보세요.</p>
                <textarea id="achievements" th:field="*{achievements}" class="form-control" rows="3"></textarea>
            </div>

            <div class="field-block">
                <label for="improvements" class="form-label field-label">Improvements</label>
                <p class="field-hint">다음번에 다르게 해보고 싶은 점을 기록합니다.</p>
                <textarea id="improvements" th:field="*{improvements}" class="form-control" rows="3"></textarea>
            </div>

            <div class="field-block">
                <label for="gratitude" class="form-label field-label">Gratitude</label>
                <p class="field-hint">작지만 감사했던 일도 함께 남겨보세요.</p>
                <textarea id="gratitude" th:field="*{gratitude}" class="form-control" rows="3"></textarea>
            </div>

            <div class="field-block">
                <label for="notes" class="form-label field-label">Notes for Tomorrow</label>
                <p class="field-hint">내일의 시작이 쉬워지도록 메모를 남깁니다.</p>
                <textarea id="notes" th:field="*{notes}" class="form-control" rows="3"></textarea>
            </div>
        </div>

        <div class="button-row">
            <button type="submit" class="btn btn-primary">저장</button>
            <a th:href="@{/daily-log/evening}" class="btn btn-outline-secondary">날짜 선택</a>
        </div>
    </form>
</section>
</html>
