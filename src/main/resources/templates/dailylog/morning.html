<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '☀️ 아침 계획 날짜 선택')}">
<section class="page-section">
    <div class="section-hero">
        <div>
            <span class="section-eyebrow">Morning planning</span>
            <h1 class="section-title">이번 주 아침 계획 목록</h1>
            <p class="section-subtitle">새 날짜를 선택하거나 이미 작성한 아침 계획을 다시 열 수 있습니다.</p>
        </div>
    </div>

    <div class="toolbar-card mb-4">
        <form th:action="@{/daily-log/morning/edit}" method="get" class="row gy-2 gx-3 align-items-center date-toolbar">
            <div class="col-md-auto col-12">
                <label class="toolbar-label d-block mb-2">날짜 선택</label>
                <input type="date"
                       name="date"
                       class="form-control form-control-lg"
                       th:value="${#temporals.format(defaultDate, 'yyyy-MM-dd')}" />
            </div>
            <div class="col-md-auto col-12 align-self-end">
                <button type="submit" class="btn btn-primary btn-lg w-100">새 날짜 열기</button>
            </div>
        </form>
    </div>

    <div th:if="${message}" class="alert flash-alert flash-alert-success mb-4" role="alert" th:text="${message}">
        저장되었습니다.
    </div>

    <div th:if="${#lists.isEmpty(morningDates)}" class="empty-state mb-4">
        <strong>이번 주에 작성된 아침 계획이 없습니다.</strong>
        <p>오늘 날짜를 열어서 첫 계획을 작성해보세요.</p>
    </div>

    <div th:if="${!#lists.isEmpty(morningDates)}" class="entry-list mb-4">
        <a th:each="morningDate : ${morningDates}"
           class="entry-link"
           th:href="@{/daily-log/morning/edit(date=${morningDate})}">
            <div class="entry-copy">
                <span class="entry-badge">☀️</span>
                <strong th:text="${#temporals.format(morningDate, 'yyyy-MM-dd')}">2026-04-01</strong>
            </div>
            <span class="entry-arrow">열기</span>
        </a>
    </div>

    <div class="button-row">
        <a th:href="@{/}" class="btn btn-outline-secondary">홈으로</a>
    </div>
</section>
</html>
