<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, 'PDF 저장')}">
<section class="workspace-shell export-print-shell">
    <div class="surface-panel workspace-hero workspace-hero-library print-toolbar">
        <div class="workspace-header workspace-header-rich">
            <div class="workspace-header-copy">
                <h1 class="section-title">PDF 리포트 미리보기</h1>
            </div>
            <div class="workspace-meta-stack">
                <div class="workspace-meta-card">
                    <span class="workspace-meta-label">기간</span>
                    <strong th:text="|${#temporals.format(libraryViewDto.searchCriteria.startDate, 'yyyy.MM.dd')} ~ ${#temporals.format(libraryViewDto.searchCriteria.endDate, 'yyyy.MM.dd')}|">
                        2026.04.20 ~ 2026.04.24
                    </strong>
                </div>
                <div class="workspace-meta-card workspace-meta-card-accent">
                    <span class="workspace-meta-label">실행</span>
                    <div class="button-inline-row">
                        <button type="button" class="btn btn-primary btn-sm" data-print-page>PDF로 저장</button>
                        <a th:href="@{/daily-log/library(from=${#temporals.format(libraryViewDto.searchCriteria.startDate, 'yyyy-MM-dd')},to=${#temporals.format(libraryViewDto.searchCriteria.endDate, 'yyyy-MM-dd')},keyword=${libraryViewDto.searchCriteria.keywordOrNull})}"
                           class="btn btn-outline-secondary btn-sm">
                            라이브러리로
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="surface-panel reader-article reader-article-premium export-document export-report">
        <div class="reader-document-header export-document-header export-report-cover">
            <div>
                <h2>기록 라이브러리</h2>
                <p th:text="|${#temporals.format(libraryViewDto.searchCriteria.startDate, 'yyyy.MM.dd')} ~ ${#temporals.format(libraryViewDto.searchCriteria.endDate, 'yyyy.MM.dd')}|">
                    2026.01.01 ~ 2026.04.24
                </p>
            </div>
            <span class="content-badge reader-badge" th:text="${libraryViewDto.entryCount} + '일'">0일</span>
        </div>

        <div class="export-report-body">
            <section class="export-report-summary" aria-label="기록 요약">
                <div class="export-summary-card export-summary-card-primary">
                    <span>완료율</span>
                    <strong th:text="${libraryViewDto.averageCompletionPercent} + '%'">0%</strong>
                </div>
                <div class="export-summary-card">
                    <span>기록 수</span>
                    <strong th:text="${libraryViewDto.entryCount} + '일'">0일</strong>
                </div>
                <div class="export-summary-card">
                    <span>목표 현황</span>
                    <strong th:text="${libraryViewDto.achievedGoalCount} + ' / ' + ${libraryViewDto.totalGoalCount}">
                        0 / 0
                    </strong>
                </div>
            </section>

            <section class="export-report-insight" aria-label="내보내기 조건">
                <div>
                    <h3>선택한 기간</h3>
                </div>
                <div class="export-condition-list">
                    <span th:text="|기간 ${libraryViewDto.searchCriteria.startDate} ~ ${libraryViewDto.searchCriteria.endDate}|">
                        기간 2026-01-01 ~ 2026-04-24
                    </span>
                    <span th:if="${libraryViewDto.searchCriteria.hasKeyword()}"
                          th:text="|검색어 ${libraryViewDto.searchCriteria.keywordOrNull}|">
                        검색어 제품 흐름
                    </span>
                    <span th:text="|아침 ${libraryViewDto.morningLogCount}일 · 저녁 ${libraryViewDto.eveningLogCount}일|">
                        아침 0일 · 저녁 0일
                    </span>
                </div>
            </section>

            <section th:if="${!libraryViewDto.hasEntries()}" class="export-empty-state">
                <h3>조건에 맞는 기록이 없습니다.</h3>
            </section>

            <article th:each="libraryItem : ${libraryViewDto.items}" class="export-entry-card">
                <div class="export-entry-date">
                    <span th:text="${libraryItem.dayLabel}">금</span>
                    <strong th:text="${#temporals.format(libraryItem.date, 'MM.dd')}">04.24</strong>
                </div>
                <div class="export-entry-main">
                    <div class="export-entry-header">
                        <div>
                            <span class="content-badge" th:text="${libraryItem.flowLabel}">계획과 회고</span>
                            <h3 th:text="${#temporals.format(libraryItem.date, 'yyyy년 M월 d일')}">
                                2026년 4월 24일
                            </h3>
                            <p th:text="${libraryItem.excerpt}">기록 요약입니다.</p>
                        </div>
                        <div class="export-entry-score" th:text="${libraryItem.completionPercent} + '%'">0%</div>
                    </div>
                    <div class="export-entry-meta">
                        <span th:text="${libraryItem.achievedGoalCount} + ' / ' + ${libraryItem.totalGoalCount} + ' 완료'">
                            0 / 0 완료
                        </span>
                        <span th:if="${libraryItem.hasMorningLog()}">아침 계획</span>
                        <span th:if="${libraryItem.hasEveningLog()}">저녁 회고</span>
                    </div>
                    <div class="preview-markdown log-article log-article-premium export-entry-markdown"
                         th:utext="${exportItemHtmlByDate.get(libraryItem.date)}">
                        내보내기 내용
                    </div>
                </div>
            </article>
        </div>
    </div>
</section>
</html>
