spring:
  datasource:
    url: jdbc:h2:mem:daylog-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false
day-log:
  storage:
    logs-root-path: build/test-logs
  security:
    remember-me-key: test-remember-me-key
