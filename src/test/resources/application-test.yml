spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-daymark-google-client-id
            client-secret: test-daymark-google-client-secret
            scope:
              - openid
              - email
              - profile
  datasource:
    url: jdbc:h2:mem:daymark-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false
daymark:
  operations:
    administrator-workspace-ids: potterLim
  security:
    remember-me-key: test-remember-me-key
