services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-daymark}
      MYSQL_USER: ${MYSQL_USER:-daymark}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - daymark-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      PORT: 8080
      DAYMARK_PUBLIC_BASE_URL: ${DAYMARK_PUBLIC_BASE_URL}
      DATABASE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-daymark}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DATABASE_USERNAME: ${MYSQL_USER:-daymark}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DAYMARK_REMEMBER_ME_KEY: ${DAYMARK_REMEMBER_ME_KEY}
      DAYMARK_REMEMBER_ME_COOKIE_SECURE: ${DAYMARK_REMEMBER_ME_COOKIE_SECURE:-true}
      SERVER_SERVLET_SESSION_COOKIE_SECURE: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:-true}
      DAYMARK_MAIL_FROM_ADDRESS: ${DAYMARK_MAIL_FROM_ADDRESS:-no-reply@example.com}
      DAYMARK_ALERT_WEBHOOK_URL: ${DAYMARK_ALERT_WEBHOOK_URL:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-}
      DAYMARK_LOG_DIR: /app/ops/runtime/logs
      DAYMARK_TOMCAT_BASE_DIR: /app/ops/runtime/tomcat
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./ops/runtime:/app/ops/runtime
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  backup:
    image: mysql:8.0
    profiles: ["ops"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-daymark}
      MYSQL_USER: ${MYSQL_USER:-daymark}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DAYMARK_BACKUP_DIR: /backups
      DAYMARK_BACKUP_RETENTION_DAYS: ${DAYMARK_BACKUP_RETENTION_DAYS:-14}
      DAYMARK_ALERT_WEBHOOK_URL: ${DAYMARK_ALERT_WEBHOOK_URL:-}
      DAYMARK_BACKUP_NOTIFY_ON_SUCCESS: ${DAYMARK_BACKUP_NOTIFY_ON_SUCCESS:-false}
      DAYMARK_BACKUP_VERIFY_TABLES: ${DAYMARK_BACKUP_VERIFY_TABLES:-flyway_schema_history,user_account,daymark_entry}
    volumes:
      - ./ops/backup:/opt/daymark/backup:ro
      - ./ops/runtime/backups:/backups
    entrypoint: ["/bin/bash", "/opt/daymark/backup/mysql-backup.sh"]

volumes:
  daymark-mysql-data:
